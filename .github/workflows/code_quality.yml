name: Code Quality Checks

on: 
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  quality-checks:
    name: Check ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: 
          - "src/telegram_user_app_service"
          - "src/news_analysis_service"
          - "src/news_collection_service"
    
    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: MyPy check
        run: uv run mypy .

      - name: Ruff check (Lint + Format)
        run: |
          uv run ruff check .
          uv run ruff format --check .

  md-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint all Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: '.github/workflows/config/.markdownlint.yml'
          globs: '**/*.md'
